<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC-OSC Audio Analyzer</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; color: #e0e0e0; background: #1a1a2e; }
        h1 { color: #e94560; }
        .status { padding: 1rem; background: #16213e; border-radius: 8px; margin: 1rem 0; }
        .ok { border-left: 4px solid #0f3460; }
        .nav a { color: #e94560; text-decoration: none; margin-right: 1rem; }
        .nav { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/">Home</a>
        <a href="/static/config.html">Config</a>
    </div>
    <h1>SC-OSC Audio Analyzer</h1>
    <div class="status ok" id="status">Connecting...</div>
    <script>
        fetch('/api/ping')
            .then(r => r.json())
            .then(data => {
                document.getElementById('status').textContent = 'Server: ' + data.status;
            })
            .catch(() => {
                document.getElementById('status').textContent = 'Server unreachable';
            });
    </script>
</body>
</html>
