<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SC-OSC — Logs</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;400&display=swap');
:root { --bg: #0a0a1a; --surface: #0f1029; --accent: #e94560; --cyan: #00e5ff; --dim: #2a2a4a; --text: #c0c0d8; --text-dim: #5a5a7a; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
.nav { display: flex; gap: 1.5rem; padding: 1rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--dim); font-family: 'Orbitron', sans-serif; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; }
.nav a { color: var(--text-dim); text-decoration: none; }
.nav a:hover, .nav a.active { color: var(--accent); }
.controls { display: flex; gap: 1rem; padding: 0.75rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--dim); align-items: center; flex-wrap: wrap; }
.controls label { font-size: 0.75rem; color: var(--text-dim); }
.controls select, .controls button { background: #161638; color: var(--text); border: 1px solid var(--dim); border-radius: 4px; padding: 0.35rem 0.6rem; font-family: inherit; font-size: 0.8rem; cursor: pointer; }
.controls select:focus, .controls button:focus { outline: none; border-color: var(--accent); }
.controls button { background: var(--accent); color: #fff; border-color: var(--accent); }
.controls button:hover { background: #c73650; }
.controls .auto-label { font-size: 0.7rem; color: var(--text-dim); display: flex; align-items: center; gap: 0.3rem; }
.controls input[type="checkbox"] { accent-color: var(--accent); }
.log-container { flex: 1; overflow-y: auto; padding: 0.5rem 1rem; }
.log-line { font-size: 0.78rem; line-height: 1.6; white-space: pre-wrap; word-break: break-all; border-bottom: 1px solid rgba(42,42,74,0.3); padding: 1px 0; }
.log-line.error { color: var(--accent); }
.log-line.warn { color: #ffd700; }
.log-line.info { color: var(--text); }
.status-bar { padding: 0.4rem 1.5rem; background: var(--surface); border-top: 1px solid var(--dim); font-size: 0.7rem; color: var(--text-dim); display: flex; justify-content: space-between; }
</style>
</head>
<body>
<nav class="nav">
  <a href="/">Home</a>
  <a href="/static/config.html">Config</a>
  <a href="/static/viz.html">Viz</a>
  <a href="/static/help.html">Help</a>
  <a href="/static/logs.html" class="active">Logs</a>
</nav>

<div class="controls">
  <label>Source:</label>
  <select id="logFile" onchange="loadLogs()">
    <option value="analyzer">Analyzer (sclang)</option>
    <option value="web">Web Server</option>
  </select>
  <label>Lines:</label>
  <select id="numLines" onchange="loadLogs()">
    <option value="50">50</option>
    <option value="100" selected>100</option>
    <option value="200">200</option>
    <option value="500">500</option>
  </select>
  <button onclick="loadLogs()">Refresh</button>
  <label class="auto-label">
    <input type="checkbox" id="autoRefresh" checked> Auto-refresh (5s)
  </label>
</div>

<div class="log-container" id="logContainer"></div>

<div class="status-bar">
  <span id="statusText">Loading...</span>
  <span id="statusTime"></span>
</div>

<script>
let refreshTimer = null;

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function classifyLine(line) {
  const lower = line.toLowerCase();
  if (lower.includes('error') || lower.includes('fail') || lower.includes('exception')) return 'error';
  if (lower.includes('warn')) return 'warn';
  return 'info';
}

async function loadLogs() {
  const file = document.getElementById('logFile').value;
  const lines = document.getElementById('numLines').value;
  const container = document.getElementById('logContainer');

  try {
    const resp = await fetch(`/api/logs?file=${file}&lines=${lines}`);
    const data = await resp.json();

    if (data.status === 'error') {
      container.innerHTML = `<div class="log-line error">${esc(data.message)}</div>`;
      return;
    }

    const wasAtBottom = container.scrollTop + container.clientHeight >= container.scrollHeight - 20;

    container.innerHTML = data.lines.map(line => {
      const cls = classifyLine(line);
      return `<div class="log-line ${cls}">${esc(line)}</div>`;
    }).join('');

    document.getElementById('statusText').textContent =
      `${data.file}.log — showing ${data.lines.length} of ${data.total} lines`;
    document.getElementById('statusTime').textContent =
      'Updated: ' + new Date().toLocaleTimeString();

    // Auto-scroll to bottom if user was already at bottom
    if (wasAtBottom) {
      container.scrollTop = container.scrollHeight;
    }
  } catch (e) {
    container.innerHTML = `<div class="log-line error">Failed to load: ${esc(e.message)}</div>`;
  }
}

function scheduleRefresh() {
  clearInterval(refreshTimer);
  if (document.getElementById('autoRefresh').checked) {
    refreshTimer = setInterval(loadLogs, 5000);
  }
}

document.getElementById('autoRefresh').addEventListener('change', scheduleRefresh);
loadLogs();
scheduleRefresh();
</script>
</body>
</html>
