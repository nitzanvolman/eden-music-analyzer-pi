<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eden — Live Audio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap');

:root {
  --bg: #0a0a1a;
  --surface: #0f1029;
  --surface2: #161638;
  --accent: #e94560;
  --accent-glow: #ff2d55;
  --cyan: #00e5ff;
  --gold: #ffd700;
  --green: #39ff14;
  --dim: #2a2a4a;
  --text: #c0c0d8;
  --text-dim: #5a5a7a;
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(233,69,96,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(0,229,255,0.04) 0%, transparent 50%),
    linear-gradient(rgba(15,16,41,0.9) 1px, transparent 1px),
    linear-gradient(90deg, rgba(15,16,41,0.9) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
  z-index: -1;
  opacity: 0.6;
}

.nav {
  display: flex;
  gap: 1.5rem;
  padding: 1rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--dim);
  font-family: 'Orbitron', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.nav a {
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.2s;
}
.nav a:hover, .nav a.active { color: var(--accent); }

header {
  text-align: center;
  padding: 1.5rem 1rem 0.5rem;
}
header h1 {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(1.2rem, 4vw, 2rem);
  background: linear-gradient(135deg, var(--accent) 0%, var(--cyan) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.1em;
}
.conn-status {
  font-size: 0.65rem;
  color: var(--text-dim);
  margin-top: 0.25rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.conn-status.connected { color: var(--green); }
.conn-status.error { color: var(--accent); }

/* === GRID LAYOUT === */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
  padding: 1rem;
  max-width: 1400px;
  margin: 0 auto;
}

/* === CARD === */
.card {
  background: var(--surface);
  border: 1px solid var(--dim);
  border-radius: var(--radius);
  padding: 1rem;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s;
}
.card:hover { border-color: rgba(233,69,96,0.3); }
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.4;
}
.card-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 0.75rem;
}
.card-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: #fff;
  line-height: 1;
}
.card-sub {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 0.25rem;
}

/* === BEAT CARD === */
.card.beat-card {
  transition: background 0.08s, border-color 0.08s, box-shadow 0.08s;
}
.card.beat-card.flash {
  background: rgba(233,69,96,0.15);
  border-color: var(--accent);
  box-shadow: 0 0 30px rgba(233,69,96,0.3), inset 0 0 30px rgba(233,69,96,0.05);
}

/* === ONSET FLASH === */
.onset-flash {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  opacity: 0;
  background: radial-gradient(circle at center, rgba(255,215,0,0.15) 0%, transparent 70%);
  transition: opacity 0.05s;
}
.onset-flash.active { opacity: 1; transition: opacity 0s; }

/* === METER BAR === */
.meter {
  width: 100%;
  height: 24px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  margin-top: 0.5rem;
}
.meter-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.06s linear;
  position: relative;
}
.meter-fill.amp {
  background: linear-gradient(90deg, var(--green), var(--gold) 70%, var(--accent) 95%);
  box-shadow: 0 0 10px rgba(57,255,20,0.3);
}
.meter-fill.loud {
  background: linear-gradient(90deg, var(--cyan), #7c4dff 70%, var(--accent) 95%);
  box-shadow: 0 0 10px rgba(0,229,255,0.3);
}
.meter-fill.bright {
  background: linear-gradient(90deg, #ff6b35, var(--gold) 50%, #fff 95%);
}
.meter-fill.noise {
  background: linear-gradient(90deg, var(--cyan), var(--accent));
}

/* === CANVAS CARDS === */
canvas {
  width: 100%;
  display: block;
  border-radius: 4px;
}

/* === KEY DISPLAY === */
.key-display {
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
}
.key-note {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.8rem;
  font-weight: 900;
  background: linear-gradient(180deg, #fff 30%, var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.key-mode {
  font-family: 'Orbitron', sans-serif;
  font-size: 0.9rem;
  font-weight: 400;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.key-mode.major { color: var(--gold); }
.key-mode.minor { color: var(--cyan); }

/* === WIDE CARDS === */
.card.wide { grid-column: span 2; }
@media (max-width: 620px) { .card.wide { grid-column: span 1; } }

/* Scanline effect */
.scanline {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: rgba(0,229,255,0.08);
  z-index: 99;
  pointer-events: none;
  animation: scanline 4s linear infinite;
}
@keyframes scanline {
  0% { top: -2px; }
  100% { top: 100vh; }
}
</style>
</head>
<body>

<div class="scanline"></div>
<div class="onset-flash" id="onsetFlash"></div>

<nav class="nav">
  <a href="/">Home</a>
  <a href="/static/config.html">Config</a>
  <a href="/static/viz.html" class="active">Viz</a>
</nav>

<header>
  <h1>EDEN AUDIO</h1>
  <div class="conn-status" id="connStatus">connecting...</div>
</header>

<div class="grid">

  <!-- BPM + Beat -->
  <div class="card beat-card" id="beatCard">
    <div class="card-label">Tempo</div>
    <div class="card-value" id="bpmVal">---</div>
    <div class="card-sub">BPM</div>
  </div>

  <!-- Key -->
  <div class="card">
    <div class="card-label">Key</div>
    <div class="key-display">
      <span class="key-note" id="keyNote">--</span>
      <span class="key-mode" id="keyMode"></span>
    </div>
  </div>

  <!-- Amplitude -->
  <div class="card">
    <div class="card-label">Amplitude</div>
    <div class="card-value" id="ampVal">0.00</div>
    <div class="meter"><div class="meter-fill amp" id="ampBar" style="width:0%"></div></div>
  </div>

  <!-- Pitch -->
  <div class="card">
    <div class="card-label">Pitch</div>
    <div class="card-value" id="pitchVal">--- Hz</div>
    <div class="card-sub" id="pitchConf">confidence: --</div>
  </div>

  <!-- Loudness -->
  <div class="card">
    <div class="card-label">Loudness</div>
    <div class="card-value" id="loudVal">0.0</div>
    <div class="card-sub">sones</div>
    <div class="meter"><div class="meter-fill loud" id="loudBar" style="width:0%"></div></div>
  </div>

  <!-- Spectral Centroid (brightness) -->
  <div class="card">
    <div class="card-label">Brightness</div>
    <div class="card-value" id="centVal">--- Hz</div>
    <div class="meter"><div class="meter-fill bright" id="centBar" style="width:0%"></div></div>
  </div>

  <!-- Spectral Flatness (noisiness) -->
  <div class="card">
    <div class="card-label">Noisiness</div>
    <div class="card-value" id="flatVal">0.00</div>
    <div class="meter"><div class="meter-fill noise" id="flatBar" style="width:0%"></div></div>
  </div>

  <!-- Onset -->
  <div class="card">
    <div class="card-label">Onsets</div>
    <div class="card-value" id="onsetCount">0</div>
    <div class="card-sub" id="onsetRate">0 /sec</div>
  </div>

  <!-- Chromagram -->
  <div class="card wide">
    <div class="card-label">Chromagram</div>
    <canvas id="chromaCanvas" height="100"></canvas>
  </div>

  <!-- MFCC -->
  <div class="card wide">
    <div class="card-label">MFCC Timbre</div>
    <canvas id="mfccCanvas" height="100"></canvas>
  </div>

</div>

<script>
// ============================================================
// STATE
// ============================================================
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const state = {
  amp: 0, pitch: 0, hasFreq: 0, loud: 0,
  centroid: 0, flatness: 0, bpm: 0,
  key: 0, mode: 1,
  chroma: new Float32Array(12),
  mfcc: new Float32Array(13),
  onsetCount: 0, onsetTimes: [],
};

// Smoothed values for display
const smooth = { amp: 0, loud: 0, centroid: 0, flatness: 0 };
const SMOOTH = 0.3; // lower = smoother

// ============================================================
// WEBSOCKET
// ============================================================
let ws = null;
let reconnectTimer = null;

function connect() {
  clearTimeout(reconnectTimer);
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/osc`);

  ws.onopen = () => {
    document.getElementById('connStatus').textContent = 'live';
    document.getElementById('connStatus').className = 'conn-status connected';
  };

  ws.onclose = () => {
    document.getElementById('connStatus').textContent = 'disconnected — reconnecting...';
    document.getElementById('connStatus').className = 'conn-status error';
    reconnectTimer = setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      handleOSC(msg.address, msg.args);
    } catch(e) { console.warn('WS parse error:', e); }
  };
}

function handleOSC(addr, args) {
  switch(addr) {
    case '/audio/amplitude':
      state.amp = args[0];
      break;
    case '/audio/pitch':
      state.pitch = args[0];
      state.hasFreq = args[1];
      break;
    case '/audio/loudness':
      state.loud = args[0];
      break;
    case '/audio/spectral/centroid':
      state.centroid = args[0];
      break;
    case '/audio/spectral/flatness':
      state.flatness = args[0];
      break;
    case '/audio/onset':
      state.onsetCount++;
      state.onsetTimes.push(performance.now());
      flashOnset();
      break;
    case '/audio/beat':
      flashBeat();
      break;
    case '/audio/bpm':
      state.bpm = args[0];
      break;
    case '/audio/key':
      state.key = args[0];
      state.mode = args[1];
      break;
    case '/audio/chroma':
      for (let i = 0; i < Math.min(args.length, 12); i++) state.chroma[i] = args[i];
      break;
    case '/audio/mfcc':
      for (let i = 0; i < Math.min(args.length, 13); i++) state.mfcc[i] = args[i];
      break;
  }
}

// ============================================================
// FLASH EFFECTS
// ============================================================
let beatTimeout = null;
function flashBeat() {
  const el = document.getElementById('beatCard');
  el.classList.add('flash');
  clearTimeout(beatTimeout);
  beatTimeout = setTimeout(() => el.classList.remove('flash'), 150);
}

let onsetTimeout = null;
function flashOnset() {
  const el = document.getElementById('onsetFlash');
  el.classList.add('active');
  clearTimeout(onsetTimeout);
  onsetTimeout = setTimeout(() => el.classList.remove('active'), 80);
}

// ============================================================
// RENDER LOOP
// ============================================================
function lerp(a, b, t) { return a + (b - a) * t; }

function updateDOM() {
  // Smooth values
  smooth.amp = lerp(smooth.amp, state.amp, SMOOTH);
  smooth.loud = lerp(smooth.loud, state.loud, SMOOTH);
  smooth.centroid = lerp(smooth.centroid, state.centroid, SMOOTH);
  smooth.flatness = lerp(smooth.flatness, state.flatness, SMOOTH);

  // Amplitude
  document.getElementById('ampVal').textContent = smooth.amp.toFixed(2);
  document.getElementById('ampBar').style.width = (smooth.amp * 100) + '%';

  // Pitch
  if (state.hasFreq > 0.5) {
    document.getElementById('pitchVal').textContent = Math.round(state.pitch) + ' Hz';
    document.getElementById('pitchConf').textContent = 'confidence: ' + (state.hasFreq * 100).toFixed(0) + '%';
  } else {
    document.getElementById('pitchVal').textContent = '--- Hz';
    document.getElementById('pitchConf').textContent = 'confidence: low';
  }

  // Loudness
  document.getElementById('loudVal').textContent = smooth.loud.toFixed(1);
  document.getElementById('loudBar').style.width = Math.min(smooth.loud / 64 * 100, 100) + '%';

  // Centroid (brightness)
  document.getElementById('centVal').textContent = Math.round(smooth.centroid) + ' Hz';
  document.getElementById('centBar').style.width = Math.min((smooth.centroid - 200) / 7800 * 100, 100) + '%';

  // Flatness (noisiness)
  document.getElementById('flatVal').textContent = smooth.flatness.toFixed(2);
  document.getElementById('flatBar').style.width = (smooth.flatness * 100) + '%';

  // BPM
  document.getElementById('bpmVal').textContent = state.bpm > 0 ? Math.round(state.bpm) : '---';

  // Key
  document.getElementById('keyNote').textContent = NOTE_NAMES[state.key] || '--';
  const modeEl = document.getElementById('keyMode');
  modeEl.textContent = state.mode === 1 ? 'major' : 'minor';
  modeEl.className = 'key-mode ' + (state.mode === 1 ? 'major' : 'minor');

  // Onset rate (hits per second over last 2 seconds)
  const now = performance.now();
  state.onsetTimes = state.onsetTimes.filter(t => now - t < 2000);
  const rate = state.onsetTimes.length / 2;
  document.getElementById('onsetCount').textContent = state.onsetCount;
  document.getElementById('onsetRate').textContent = rate.toFixed(1) + ' /sec';
}

// ============================================================
// CANVAS RENDERERS
// ============================================================
// Cache canvas contexts and size them once (+ on resize)
const canvases = {};

function sizeCanvases() {
  const dpr = window.devicePixelRatio || 1;
  ['chromaCanvas', 'mfccCanvas'].forEach(id => {
    const canvas = document.getElementById(id);
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.clientWidth * dpr;
    canvas.height = canvas.clientHeight * dpr;
    canvases[id] = { canvas, ctx, dpr };
  });
}
window.addEventListener('resize', sizeCanvases);

function drawChroma() {
  const { canvas, ctx, dpr } = canvases.chromaCanvas || {};
  if (!ctx) return;

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  const barW = (w - 11 * 3) / 12; // 3px gap
  const maxVal = Math.max(...state.chroma, 0.01);

  ctx.clearRect(0, 0, w, h);

  for (let i = 0; i < 12; i++) {
    const val = state.chroma[i] / maxVal;
    const barH = val * (h - 20);
    const x = i * (barW + 3);
    const y = h - 14 - barH;

    // Gradient per bar
    const grad = ctx.createLinearGradient(x, y, x, h - 14);
    const hue = (i / 12) * 300; // rainbow across pitch classes
    grad.addColorStop(0, `hsla(${hue}, 90%, 65%, 0.95)`);
    grad.addColorStop(1, `hsla(${hue}, 70%, 35%, 0.6)`);

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, 3);
    ctx.fill();

    // Glow
    ctx.shadowColor = `hsla(${hue}, 90%, 55%, ${val * 0.5})`;
    ctx.shadowBlur = val * 12;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Note label
    ctx.fillStyle = val > 0.5 ? '#fff' : 'rgba(200,200,220,0.5)';
    ctx.font = '500 9px "JetBrains Mono"';
    ctx.textAlign = 'center';
    ctx.fillText(NOTE_NAMES[i], x + barW / 2, h - 2);
  }
}

function drawMFCC() {
  const { canvas, ctx, dpr } = canvases.mfccCanvas || {};
  if (!ctx) return;

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  const n = state.mfcc.length;
  const barW = (w - (n - 1) * 2) / n;
  const maxAbs = Math.max(...state.mfcc.map(Math.abs), 1);
  const mid = h / 2;

  ctx.clearRect(0, 0, w, h);

  // Center line
  ctx.strokeStyle = 'rgba(100,100,140,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, mid);
  ctx.lineTo(w, mid);
  ctx.stroke();

  for (let i = 0; i < n; i++) {
    const val = state.mfcc[i] / maxAbs;
    const barH = Math.abs(val) * (h / 2 - 4);
    const x = i * (barW + 2);
    const y = val >= 0 ? mid - barH : mid;

    const t = Math.abs(val);
    const r = Math.round(0 + t * 233);
    const g = Math.round(229 - t * 160);
    const b = Math.round(255 - t * 159);

    ctx.fillStyle = `rgba(${r},${g},${b},${0.5 + t * 0.5})`;
    ctx.beginPath();
    ctx.roundRect(x, y, barW, barH, 2);
    ctx.fill();

    // Glow on strong coefficients
    if (t > 0.5) {
      ctx.shadowColor = `rgba(${r},${g},${b},0.4)`;
      ctx.shadowBlur = t * 8;
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }
}

// ============================================================
// MAIN LOOP
// ============================================================
function frame() {
  updateDOM();
  drawChroma();
  drawMFCC();
  requestAnimationFrame(frame);
}

sizeCanvases();
connect();
requestAnimationFrame(frame);
</script>
</body>
</html>
